<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐢 오늘 나는 어떤가요?</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: linear-gradient(135deg, #E8F5E9 0%, #F3E5F5 100%); min-height: 100vh; }
  #root { max-width: 460px; margin: 0 auto; padding: 16px; }
  .row { display:flex; align-items:center; gap:14px; border-radius:18px; padding:14px 16px; margin-bottom:10px; cursor:pointer; border:3px solid #E0E0E0; background:#FAFAFA; transition:border-color 0.15s, background 0.15s; }
  .row:hover { border-color:#81C784; }
  .row.sel { border-color:#4CAF50 !important; background:#E8F5E9 !important; }
  .emoji-lg { font-size:42px; line-height:1; }
  .label { font-size:20px; font-weight:600; color:#333; }
  .turtle { text-align:center; font-size:64px; line-height:1; margin-bottom:4px; }
  .title { font-size:24px; font-weight:700; text-align:center; margin-bottom:20px; color:#2E7D32; }
  .btn { border:none; border-radius:50px; padding:13px 28px; font-size:18px; font-weight:700; cursor:pointer; margin:6px; font-family:inherit; }
  .btn-green { background:#4CAF50; color:#fff; }
  .btn-blue  { background:#1565C0; color:#fff; }
  .btn-gray  { background:#EEE; color:#555; }
  .btn-red   { background:#FFEBEE; color:#C62828; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .student-card { border-radius:20px; padding:22px 10px; cursor:pointer; text-align:center; font-size:20px; font-weight:700; color:#333; border:3px solid transparent; box-shadow:0 3px 10px rgba(0,0,0,.1); transition:transform 0.1s; }
  .student-card:hover { transform:scale(1.04); }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:99; }
  .modal { background:#fff; border-radius:24px; padding:32px 28px; text-align:center; min-width:260px; }
  .pin-input { font-size:22px; width:100%; text-align:center; border-radius:12px; border:2px solid #ddd; padding:10px 0; font-family:inherit; }
  .tag { display:inline-block; padding:4px 12px; border-radius:20px; font-size:14px; margin:3px 4px 3px 0; }
  .rec-card { background:#fff; border-radius:16px; padding:16px; margin-bottom:12px; border:1.5px solid #E0E0E0; }
  .rec-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .dot { width:28px; height:28px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
  .name-row { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
  .name-input { flex:1; padding:6px 10px; border-radius:8px; border:1.5px solid #ccc; font-size:15px; font-family:inherit; }
  .teacher-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .section-box { background:#F9F9F9; border-radius:16px; padding:16px; margin-bottom:20px; }
  .section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .done-center { text-align:center; padding-top:24px; }
  .done-summary { background:#F1F8E9; border-radius:20px; padding:24px; display:inline-block; margin-bottom:24px; }
  input:focus { outline:2px solid #4CAF50; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const DEFAULT_STUDENTS = ["어린이1","어린이2","어린이3","어린이4","어린이5","어린이6"];
const COLORS = ["#FFE0B2","#C8E6C9","#BBDEFB","#F8BBD0","#E1BEE7","#FFF9C4"];

const EMOTIONS = [
  { emoji:"😊", label:"기분 좋아요", bg:"#FFF9C4", border:"#F9A825" },
  { emoji:"😐", label:"그냥 그래요", bg:"#F5F5F5", border:"#9E9E9E" },
  { emoji:"😢", label:"슬퍼요",       bg:"#E3F2FD", border:"#1565C0" },
  { emoji:"😠", label:"화나요",       bg:"#FFEBEE", border:"#C62828" },
  { emoji:"😰", label:"불안해요",     bg:"#EDE7F6", border:"#4527A0" },
];
const SITUATIONS = [
  { emoji:"👊", label:"친구랑 다퉜어요" },
  { emoji:"😝", label:"친구를 놀렸어요" },
  { emoji:"📚", label:"수업이 힘들었어요" },
  { emoji:"🤕", label:"몸이 힘들었어요" },
  { emoji:"😌", label:"별일 없었어요" },
];
const COMMITMENTS = [
  { emoji:"🤝", label:"먼저 사과할게요" },
  { emoji:"🤐", label:"나쁜 말 안 할게요" },
  { emoji:"🙋", label:"선생님께 말할게요" },
  { emoji:"🐢", label:"거북이처럼 참을게요" },
  { emoji:"💪", label:"잘 할 수 있어요" },
];

function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function App() {
  const [screen, setScreen] = useState("start");
  const [students, setStudents] = useState(() => load("emo_students", DEFAULT_STUDENTS));
  const [editNames, setEditNames] = useState(students);
  const [sel, setSel] = useState({ student:null, emotion:null, situation:null, commitment:null });
  const [records, setRecords] = useState(() => load("emo_records", []));
  const [pin, setPin] = useState("");
  const [showPin, setShowPin] = useState(false);
  const [pinErr, setPinErr] = useState(false);
  const [editMode, setEditMode] = useState(false);

  const pick = (k, v) => setSel(s => ({ ...s, [k]: v }));

  const doSaveRecord = (rec) => {
    const next = [rec, ...records];
    setRecords(next);
    save("emo_records", next);
  };

  const finish = () => {
    const now = new Date();
    doSaveRecord({
      ...sel,
      date: now.toLocaleDateString("ko-KR"),
      time: now.toLocaleTimeString("ko-KR", { hour:"2-digit", minute:"2-digit" }),
    });
    setScreen("done");
  };

  const reset = () => {
    setSel({ student:null, emotion:null, situation:null, commitment:null });
    setScreen("start");
  };

  const enterTeacher = () => {
    if (pin === "1234") {
      setShowPin(false); setPin(""); setScreen("teacher"); setEditMode(false);
    } else {
      setPinErr(true); setTimeout(() => setPinErr(false), 1500);
    }
  };

  const saveNames = () => {
    setStudents(editNames);
    save("emo_students", editNames);
    setEditMode(false);
  };

  const clearAll = () => {
    if (!window.confirm("모든 기록을 삭제할까요?")) return;
    setRecords([]); localStorage.removeItem("emo_records");
  };

  // ── 시작 ──
  if (screen === "start") return (
    <div>
      <div className="turtle" style={{marginTop:12}}>🐢</div>
      <div className="title">오늘 나는 어떤가요?</div>
      <p style={{textAlign:"center",fontSize:16,color:"#777",marginBottom:20}}>내 이름을 눌러요!</p>
      <div className="grid2">
        {students.map((name, i) => (
          <div key={i} className="student-card" style={{background:COLORS[i]}}
            onClick={() => { pick("student", name); setScreen("emotion"); }}>
            {name}
          </div>
        ))}
      </div>
      <div style={{textAlign:"center",marginTop:36}}>
        <span onClick={() => setShowPin(true)}
          style={{fontSize:13,color:"#bbb",cursor:"pointer",userSelect:"none"}}>
          선생님 보기
        </span>
      </div>
      {showPin && (
        <div className="overlay">
          <div className="modal">
            <div style={{fontSize:20,fontWeight:700,marginBottom:16}}>🔒 선생님 확인</div>
            <input className="pin-input" type="password" value={pin} placeholder="비밀번호"
              onChange={e => setPin(e.target.value)}
              onKeyDown={e => e.key==="Enter" && enterTeacher()} />
            {pinErr && <p style={{color:"#E53935",fontSize:14,marginTop:8}}>비밀번호가 틀렸어요 (기본: 1234)</p>}
            <div style={{marginTop:16}}>
              <button className="btn btn-green" onClick={enterTeacher}>확인</button>
              <button className="btn btn-gray" onClick={() => { setShowPin(false); setPin(""); }}>취소</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

  // ── 감정 ──
  if (screen === "emotion") return (
    <div>
      <div className="turtle" style={{marginTop:12}}>🐢</div>
      <div className="title">{sel.student}, 오늘 기분은?</div>
      {EMOTIONS.map((e, i) => (
        <div key={i} className={`row${sel.emotion?.emoji===e.emoji?" sel":""}`}
          style={{background: sel.emotion?.emoji===e.emoji ? "#E8F5E9" : e.bg,
                  borderColor: sel.emotion?.emoji===e.emoji ? "#4CAF50" : e.border}}
          onClick={() => { pick("emotion", e); setScreen("situation"); }}>
          <span className="emoji-lg">{e.emoji}</span>
          <span className="label">{e.label}</span>
        </div>
      ))}
    </div>
  );

  // ── 상황 ──
  if (screen === "situation") return (
    <div>
      <div className="turtle" style={{marginTop:12}}>🐢</div>
      <div className="title">무슨 일이 있었나요?</div>
      {SITUATIONS.map((s, i) => (
        <div key={i} className={`row${sel.situation?.label===s.label?" sel":""}`}
          onClick={() => { pick("situation", s); setScreen("commitment"); }}>
          <span className="emoji-lg">{s.emoji}</span>
          <span className="label">{s.label}</span>
        </div>
      ))}
    </div>
  );

  // ── 다짐 ──
  if (screen === "commitment") return (
    <div>
      <div className="turtle" style={{marginTop:12}}>🐢</div>
      <div className="title">다음엔 이렇게 할 거예요!</div>
      {COMMITMENTS.map((c, i) => (
        <div key={i} className={`row${sel.commitment?.label===c.label?" sel":""}`}
          onClick={() => pick("commitment", c)}>
          <span className="emoji-lg">{c.emoji}</span>
          <span className="label">{c.label}</span>
        </div>
      ))}
      {sel.commitment && (
        <div style={{textAlign:"center",marginTop:16}}>
          <button className="btn btn-green" style={{fontSize:20,padding:"16px 36px"}} onClick={finish}>
            ✅ 완료!
          </button>
        </div>
      )}
    </div>
  );

  // ── 완료 ──
  if (screen === "done") return (
    <div className="done-center">
      <div style={{fontSize:80}}>🐢</div>
      <div style={{fontSize:56}}>⭐</div>
      <div style={{fontSize:28,fontWeight:700,color:"#2E7D32",marginBottom:8}}>
        잘했어요, {sel.student}!
      </div>
      <div style={{fontSize:18,color:"#666",marginBottom:24}}>씩씩하게 생각했어요 💪</div>
      <div className="done-summary">
        <div style={{fontSize:48,marginBottom:8}}>{sel.emotion?.emoji} → {sel.commitment?.emoji}</div>
        <div style={{fontSize:18,color:"#555"}}>{sel.commitment?.label}</div>
      </div>
      <br/>
      <button className="btn btn-green" style={{fontSize:20,padding:"16px 36px"}} onClick={reset}>
        🏠 처음으로
      </button>
    </div>
  );

  // ── 선생님 ──
  if (screen === "teacher") return (
    <div>
      <div className="teacher-header">
        <div style={{fontSize:22,fontWeight:700}}>📋 선생님 화면</div>
        <button className="btn btn-gray" onClick={reset}>← 나가기</button>
      </div>

      {/* 이름 관리 */}
      <div className="section-box">
        <div className="section-head">
          <span style={{fontWeight:700,fontSize:16}}>어린이 이름 관리</span>
          {!editMode
            ? <button className="btn btn-blue" onClick={() => { setEditMode(true); setEditNames([...students]); }}>수정</button>
            : <div>
                <button className="btn btn-green" onClick={saveNames}>저장</button>
                <button className="btn btn-gray" onClick={() => setEditMode(false)}>취소</button>
              </div>
          }
        </div>
        <div className="grid2">
          {(editMode ? editNames : students).map((name, i) => (
            <div key={i} className="name-row">
              <div className="dot" style={{background:COLORS[i]}}>{i+1}</div>
              {editMode
                ? <input className="name-input" value={editNames[i]}
                    onChange={e => { const n=[...editNames]; n[i]=e.target.value; setEditNames(n); }} />
                : <span style={{fontSize:16}}>{name}</span>
              }
            </div>
          ))}
        </div>
      </div>

      {/* 기록 */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontWeight:700,fontSize:16}}>기록 ({records.length}건)</span>
        {records.length > 0 && <button className="btn btn-red" onClick={clearAll}>전체 삭제</button>}
      </div>
      {records.length === 0
        ? <div style={{textAlign:"center",color:"#aaa",fontSize:18,paddingTop:32}}>아직 기록이 없어요 🐢</div>
        : records.map((r, i) => (
          <div key={i} className="rec-card">
            <div className="rec-head">
              <span style={{fontWeight:700,fontSize:17}}>{r.student}</span>
              <span style={{color:"#999",fontSize:13}}>{r.date} {r.time}</span>
            </div>
            <div>
              <span className="tag" style={{background:"#FFF9C4",color:"#795548"}}>{r.emotion?.emoji} {r.emotion?.label}</span>
              <span className="tag" style={{background:"#E3F2FD",color:"#1565C0"}}>{r.situation?.emoji} {r.situation?.label}</span>
              <span className="tag" style={{background:"#E8F5E9",color:"#2E7D32"}}>{r.commitment?.emoji} {r.commitment?.label}</span>
            </div>
          </div>
        ))
      }
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
